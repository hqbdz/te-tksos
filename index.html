<!-- index.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đặt hàng</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:30px}
.box{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#0d6efd;color:#fff;border:0}
</style>
</head>
<body>
<div class="box">
<h2>Đặt hàng</h2>
<input id="name" placeholder="Tên người đặt">
<input id="service" placeholder="Dịch vụ">
<input id="qty" placeholder="Số lượng">
<input id="link" placeholder="Link">
<button onclick="sendOrder()">Đặt hàng</button>
<p id="msg"></p>
</div>

<script>
async function sendOrder(){
const data={
name:name.value,
service:service.value,
qty:qty.value,
link:link.value
};

const res=await fetch('/order',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(data)
});

const json=await res.json();
msg.innerText=json.message;
}
</script>
</body>
</html>
